# =============================================================================
# DarkTrace - Docker Compose Production Configuration
# =============================================================================
# Dark Web Surveillance & Threat Intelligence Tool
#
# Services:
#   backend       - FastAPI application server
#   frontend      - React SPA served via nginx
#   mongodb       - Document store for raw content, users, config
#   elasticsearch - Full-text search and analytics engine
#   neo4j         - Graph database for actor network analysis
#   redis         - Cache, rate limiting, session store
#   rabbitmq      - Message broker for event-driven microservices
#   crawler-worker - Scrapy-based dark web crawler
#   nlp-worker    - NLP analysis engine
#
# Networks:
#   frontend - Public-facing services (frontend, backend API)
#   backend  - Internal service communication
#   data     - Database and storage tier
# =============================================================================


# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
    name: darktrace_mongodb_data
  elasticsearch_data:
    driver: local
    name: darktrace_elasticsearch_data
  neo4j_data:
    driver: local
    name: darktrace_neo4j_data
  neo4j_logs:
    driver: local
    name: darktrace_neo4j_logs
  redis_data:
    driver: local
    name: darktrace_redis_data
  rabbitmq_data:
    driver: local
    name: darktrace_rabbitmq_data
  model_cache:
    driver: local
    name: darktrace_model_cache

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  frontend:
    name: darktrace_frontend
    driver: bridge
    ipam:
      config:
        - subnet: "172.20.0.0/24"
  backend:
    name: darktrace_backend
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "172.20.1.0/24"
  data:
    name: darktrace_data
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "172.20.2.0/24"

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── Tor Proxy ─────────────────────────────────────────────────────────────
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: darktrace-tor-proxy
    hostname: tor-proxy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "9050:9050"
    healthcheck:
      test: ["CMD", "curl", "--socks5-hostname", "localhost:9050", "--max-time", "5", "https://check.torproject.org/api/ip"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
          cpus: "0.1"

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: darktrace-mongodb
    hostname: mongodb
    restart: unless-stopped
    networks:
      - data
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-darktrace}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-darktrace_pass}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-darktrace}
    ports:
      # Internal only; expose via docker-compose.override.yml for dev
      - "127.0.0.1:27018:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.14.3
    container_name: darktrace-elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    networks:
      - data
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    environment:
      - cluster.name=darktrace-cluster
      - node.name=darktrace-es-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.authc.api_key.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-darktrace_es_pass}
      - ingest.geoip.downloader.enabled=false
    ports:
      - "127.0.0.1:9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '"status":"green"' || curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '"status":"yellow"'
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4.0"
        reservations:
          memory: 2g
          cpus: "1.0"

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.21.0
    container_name: darktrace-neo4j
    hostname: neo4j
    restart: unless-stopped
    networks:
      - data
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/darktrace_neo4j_pass}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-darktrace_neo4j_pass} "RETURN 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: darktrace-redis
    hostname: redis
    restart: unless-stopped
    networks:
      - data
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-darktrace_redis_pass}
    command: >
      sh -c "redis-server --requirepass \"$${REDIS_PASSWORD:-darktrace_redis_pass}\" --appendonly yes --appendfsync everysec --save 900 1 --save 300 10 --save 60 10000"
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: redis-cli -a $${REDIS_PASSWORD:-darktrace_redis_pass} ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
          cpus: "0.25"

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: darktrace-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    networks:
      - backend
      - data
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-darktrace}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-darktrace_rabbit_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_for_darktrace}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_running --silent 2>/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_NAMESPACE:-darktrace}/backend:${IMAGE_TAG:-latest}
    container_name: darktrace-backend
    hostname: backend
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - data
    environment:
      - APP_NAME=${APP_NAME:-DarkTrace API}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - API_PREFIX=${API_PREFIX:-/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - MONGODB_URI=${MONGODB_URI:-mongodb://darktrace:darktrace_pass@mongodb:27017/darktrace?authSource=admin}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-darktrace}
      - MONGODB_MAX_POOL_SIZE=${MONGODB_MAX_POOL_SIZE:-100}
      - MONGODB_MIN_POOL_SIZE=${MONGODB_MIN_POOL_SIZE:-10}
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS:-http://elasticsearch:9200}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ELASTICSEARCH_VERIFY_CERTS=${ELASTICSEARCH_VERIFY_CERTS:-false}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_MAX_CONNECTION_POOL_SIZE=${NEO4J_MAX_CONNECTION_POOL_SIZE:-50}
      - REDIS_URI=${REDIS_URI:-redis://:darktrace_redis_pass@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_SOCKET_TIMEOUT=${REDIS_SOCKET_TIMEOUT:-5}
      - REDIS_SOCKET_CONNECT_TIMEOUT=${REDIS_SOCKET_CONNECT_TIMEOUT:-5}
      - RATE_LIMIT_PER_USER=${RATE_LIMIT_PER_USER:-100}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-1000}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - CRAWL_DELAY=${CRAWL_DELAY:-5.0}
      - CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-8}
      - PROXY_REFRESH_INTERVAL=${PROXY_REFRESH_INTERVAL:-600}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - CRAWL_TIMEOUT=${CRAWL_TIMEOUT:-60}
      - TOR_PROXY_HOST=${TOR_PROXY_HOST:-tor-proxy}
      - TOR_PROXY_PORT=${TOR_PROXY_PORT:-9050}
      - I2P_PROXY_HOST=${I2P_PROXY_HOST:-i2p-proxy}
      - I2P_PROXY_PORT=${I2P_PROXY_PORT:-4444}
      - SPACY_MODEL_EN=${SPACY_MODEL_EN:-en_core_web_trf}
      - TRANSLATION_CACHE_TTL=${TRANSLATION_CACHE_TTL:-2592000}
      - THREAT_SCORE_WEIGHTS=${THREAT_SCORE_WEIGHTS}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://darktrace:darktrace_rabbit_pass@rabbitmq:5672/}
      - REPORT_EXPIRY_HOURS=${REPORT_EXPIRY_HOURS:-1}
      - REPORT_STORAGE_PATH=${REPORT_STORAGE_PATH:-/tmp/darktrace/reports}
      - SIEM_SYSLOG_HOST=${SIEM_SYSLOG_HOST:-}
      - SIEM_SYSLOG_PORT=${SIEM_SYSLOG_PORT:-514}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@darktrace.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR:-/app/models}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-facebook/bart-large-mnli}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-distilbert-base-uncased-finetuned-sst-2-english}
    volumes:
      - model_cache:/app/models
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 1g
          cpus: "0.5"

  # ── Frontend (React SPA via Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_NAMESPACE:-darktrace}/frontend:${IMAGE_TAG:-latest}
    container_name: darktrace-frontend
    hostname: frontend
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
          cpus: "0.1"

  # ── Crawler Worker ────────────────────────────────────────────────────────
  crawler-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_NAMESPACE:-darktrace}/crawler-worker:${IMAGE_TAG:-latest}
    container_name: darktrace-crawler-worker
    hostname: crawler-worker
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - data
    environment:
      - APP_NAME=DarkTrace-Crawler
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MONGODB_URI=${MONGODB_URI:-mongodb://darktrace:darktrace_pass@mongodb:27017/darktrace?authSource=admin}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-darktrace}
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS:-http://elasticsearch:9200}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ELASTICSEARCH_VERIFY_CERTS=${ELASTICSEARCH_VERIFY_CERTS:-false}
      - REDIS_URI=${REDIS_URI:-redis://:darktrace_redis_pass@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://darktrace:darktrace_rabbit_pass@rabbitmq:5672/}
      - CRAWL_DELAY=${CRAWL_DELAY:-5.0}
      - CONCURRENT_REQUESTS=${CONCURRENT_REQUESTS:-8}
      - PROXY_REFRESH_INTERVAL=${PROXY_REFRESH_INTERVAL:-600}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - CRAWL_TIMEOUT=${CRAWL_TIMEOUT:-60}
      - TOR_PROXY_HOST=${TOR_PROXY_HOST:-tor-proxy}
      - TOR_PROXY_PORT=${TOR_PROXY_PORT:-9050}
      - I2P_PROXY_HOST=${I2P_PROXY_HOST:-i2p-proxy}
      - I2P_PROXY_PORT=${I2P_PROXY_PORT:-4444}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
        reservations:
          memory: 256m
          cpus: "0.5"

  # ── NLP Worker ────────────────────────────────────────────────────────────
  nlp-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_NAMESPACE:-darktrace}/nlp-worker:${IMAGE_TAG:-latest}
    container_name: darktrace-nlp-worker
    hostname: nlp-worker
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - data
    environment:
      - APP_NAME=DarkTrace-NLP
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MONGODB_URI=${MONGODB_URI:-mongodb://darktrace:darktrace_pass@mongodb:27017/darktrace?authSource=admin}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-darktrace}
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS:-http://elasticsearch:9200}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ELASTICSEARCH_VERIFY_CERTS=${ELASTICSEARCH_VERIFY_CERTS:-false}
      - REDIS_URI=${REDIS_URI:-redis://:darktrace_redis_pass@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://darktrace:darktrace_rabbit_pass@rabbitmq:5672/}
      - SPACY_MODEL_EN=${SPACY_MODEL_EN:-en_core_web_trf}
      - TRANSLATION_CACHE_TTL=${TRANSLATION_CACHE_TTL:-2592000}
      - THREAT_SCORE_WEIGHTS=${THREAT_SCORE_WEIGHTS}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR:-/app/models}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-facebook/bart-large-mnli}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-distilbert-base-uncased-finetuned-sst-2-english}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    volumes:
      - model_cache:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"
