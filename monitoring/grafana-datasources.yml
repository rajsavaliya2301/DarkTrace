# =============================================================================
# DarkTrace - Grafana Datasource Configuration
# =============================================================================
# Auto-provisions datasources when Grafana starts.
# Place this file in Grafana's provisioning/datasources/ directory.
# =============================================================================

apiVersion: 1

datasources:
  # ── Prometheus (metrics) ──────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST

  # ── Elasticsearch (logs) ──────────────────────────────────────────────────
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    isDefault: false
    editable: false
    jsonData:
      timeField: "@timestamp"
      esVersion: 8.14.0
      maxConcurrentShardRequests: 5
      logMessageField: "message"
      logLevelField: "level"
    secureJsonData:
      basicAuthPassword: ${ELASTICSEARCH_PASSWORD:-darktrace_es_pass}
    basicAuth: true
    basicAuthUser: ${ELASTICSEARCH_USERNAME:-elastic}

  # ── MongoDB ──────────────────────────────────────────────────────────────
  - name: MongoDB
    type: grafana-mongodb-datasource
    access: proxy
    url: mongodb://mongodb:27017
    isDefault: false
    editable: false
    jsonData:
      database: darktrace
      authMechanism: SCRAM-SHA-256
    secureJsonData:
      password: ${MONGO_INITDB_ROOT_PASSWORD:-darktrace_pass}
    basicAuth: true
    basicAuthUser: ${MONGO_INITDB_ROOT_USERNAME:-darktrace}

  # ── Redis ────────────────────────────────────────────────────────────────
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    isDefault: false
    editable: false
    jsonData:
      poolSize: 5
      timeout: 10
      pingInterval: 0
    secureJsonData:
      password: ${REDIS_PASSWORD:-darktrace_redis_pass}
