# =============================================================================
# DarkTrace - CI Pipeline
# =============================================================================
# Runs on every push to main and on pull requests.
# Jobs:
#   - lint:     Code quality checks (ESLint, Prettier, flake8)
#   - test:     Run backend and frontend test suites
#   - build:    Build Docker images
#   - security: Dependency vulnerability scanning
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_NAMESPACE: ${{ github.repository_owner }}

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Backend linting
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8 and black
        run: |
          pip install --upgrade pip
          pip install flake8==7.1.0 black==24.4.2

      - name: Run flake8 (backend)
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Run black (backend) check
        run: |
          black --check --diff backend/

      # Frontend linting
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Run ESLint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: Run TypeScript type check
        run: npm run typecheck
        working-directory: frontend

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: darktrace
          MONGO_INITDB_ROOT_PASSWORD: darktrace_pass
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet -u darktrace -p darktrace_pass --authenticationDatabase admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest==8.2.2 pytest-asyncio==0.24.0 httpx==0.27.2 pytest-cov==5.0.0

      - name: Run backend tests
        env:
          MONGODB_URI: mongodb://darktrace:darktrace_pass@localhost:27017/darktrace?authSource=admin
          REDIS_URI: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          LOG_LEVEL: error
        run: |
          python -m pytest backend/tests/ -v --cov=backend/app --cov-report=term-missing --cov-report=xml --timeout=60

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: frontend

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            file: ./backend/Dockerfile
          - service: frontend
            context: .
            file: ./frontend/Dockerfile
          - service: crawler-worker
            context: ./backend
            file: ./backend/Dockerfile
          - service: nlp-worker
            context: ./backend
            file: ./backend/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: darktrace/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Test image (basic smoke check)
        run: |
          docker run --rm darktrace/${{ matrix.service }}:ci-${{ github.sha }} sh -c "echo 'Image built successfully'" || true

  # ── Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Backend vulnerability scan
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Scan Python dependencies
        run: |
          pip-audit --strict --desc on 2>/dev/null || echo "No requirements file found, skipping"

      # Frontend vulnerability scan
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

      # Container image scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
